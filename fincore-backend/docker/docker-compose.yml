
services:
  postgres:
    image: postgres:16-alpine
    container_name: fincore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fincore_dev
      POSTGRES_USER: fincore
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fincore -d fincore_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fincore-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: fincore-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP — matches SMTP_PORT in .env.local
      - '8025:8025'   # Web UI → http://localhost:8025

volumes:
  postgres_data:
  redis_data: