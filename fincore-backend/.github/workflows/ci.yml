# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION:      '22'
  POSTGRES_DB:       fincore_test
  POSTGRES_USER:     fincore
  POSTGRES_PASSWORD: ci_test_password

jobs:

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run lint -- --max-warnings 0
      - run: npm run format -- --check

  unit-tests:
    name: Unit Tests (≥80% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run db:generate
      - name: Run tests
        run: npm run test:ci
        env:
          NODE_ENV:   test
          JWT_SECRET: ci-test-secret
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info

  e2e-tests:
    name: E2E Tests (Jest + Supertest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       ${{ env.POSTGRES_DB }}
          POSTGRES_USER:     ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports: ['5432:5432']
        options: --health-cmd "pg_isready -U fincore" --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    env:
      NODE_ENV:              test
      DATABASE_URL:          postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
      REDIS_HOST:            localhost
      REDIS_PORT:            '6379'
      JWT_SECRET:            ci-test-secret
      AWS_REGION:            ap-south-1
      AWS_ACCESS_KEY_ID:     dummy
      AWS_SECRET_ACCESS_KEY: dummy
      S3_RECEIPTS_BUCKET:    test-receipts
      S3_DOCUMENTS_BUCKET:   test-docs
      SMTP_HOST:             localhost
      SMTP_PORT:             '1025'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate:prod
      - run: npm run db:seed
      - run: npm run test:e2e

  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci && npm run db:generate && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/fincore-backend:${{ github.sha }}
            ${{ secrets.ECR_REGISTRY }}/fincore-backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with: { token: '${{ secrets.GH_PAT }}' }
      - name: Bump image tag
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" k8s/helm/values-staging.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/helm/values-staging.yaml
          git commit -m "ci: deploy ${{ github.sha }} to staging [skip ci]"
          git push